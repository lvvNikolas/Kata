<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13152a"/>
      <stop offset="100%" stop-color="#0a0c1a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="100" height="100" rx="22" fill="none"
    stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>

  <!-- K: vertical bar -->
  <rect x="17" y="14" width="17" height="72" rx="4" fill="url(#g)" filter="url(#glow)"/>

  <!-- K: upper arm -->
  <polygon points="39,45 84,8 76,19 31,55" fill="url(#g)" filter="url(#glow)"/>

  <!-- K: lower arm -->
  <polygon points="31,55 76,91 84,81 39,45" fill="url(#g)" filter="url(#glow)"/>

  <!-- Brand dot (matches "Kata." style) -->
  <circle cx="84" cy="86" r="6" fill="#6366f1"/>
  <circle cx="84" cy="86" r="6" fill="url(#g)" opacity="0.8"/>
</svg>
